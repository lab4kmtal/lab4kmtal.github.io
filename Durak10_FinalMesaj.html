<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Dünya Sensin - Neon Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;1,6..96,700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
        }

        body {
            font-family: 'Syne', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #matrix-canvas {
            position: absolute;
            inset: 0;
            z-index: -1;
            opacity: 0.12;
        }

        .gradient-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(240, 253, 244, 0.5) 0%, rgba(255, 255, 255, 1) 100%);
            z-index: -2;
        }

        .main-container {
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: emerge 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes emerge {
            to { opacity: 1; transform: scale(1); }
        }

        /* Neon Yazı Efekti */
        .headline {
            font-family: 'Bodoni Moda', serif;
            color: #064e3b;
            font-size: clamp(3.5rem, 12vw, 7rem);
            line-height: 0.95;
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: -0.04em;
            text-transform: uppercase;
            /* Yumuşak Yeşil Neon Işıltısı */
            text-shadow: 
                0 0 10px rgba(34, 197, 94, 0.2),
                0 0 20px rgba(34, 197, 94, 0.1),
                0 10px 30px rgba(0,0,0,0.05);
        }

        .subline {
            font-family: 'Syne', sans-serif;
            color: #16a34a;
            font-size: clamp(1rem, 3vw, 1.8rem);
            font-weight: 700;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            /* Alt başlık için daha belirgin neon */
            text-shadow: 0 0 8px rgba(22, 163, 74, 0.4);
        }

        .subline::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 0;
            height: 2px;
            background: #16a34a;
            box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
            animation: growLine 1.5s ease-out forwards 1s;
        }

        @keyframes growLine {
            to { width: 100%; }
        }

        /* Neon Bağlantı Noktaları */
        .node {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 15px #22c55e, 0 0 30px #22c55e;
            animation: pulse 4s infinite alternate;
            z-index: -1;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: scale(1); filter: blur(1px); }
            to { opacity: 0.9; transform: scale(2.5); filter: blur(0px); }
        }

        /* Scanline Efekti (Dijital Esinti) */
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(34, 197, 94, 0.05);
            opacity: 0.5;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            from { top: -10%; }
            to { top: 110%; }
        }

        /* Ana Sayfa Butonu */
        .home-btn {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 2px solid var(--neon-purple);
            color: var(--neon-purple);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .home-btn:hover {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 20px var(--neon-purple);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Ana Sayfa Linki -->
    <a href="index.html" class="fixed top-4 right-4 z-50 home-btn">
        <i class="fas fa-home"></i> Ana Sayfa
    </a>

    <div class="gradient-bg"></div>
    <div class="scanline"></div>
    <canvas id="matrix-canvas"></canvas>

    <!-- Neon Noktalar -->
    <div class="node" style="top: 15%; left: 10%;"></div>
    <div class="node" style="top: 85%; left: 90%;"></div>
    <div class="node" style="top: 30%; left: 80%;"></div>
    <div class="node" style="top: 60%; left: 15%;"></div>

    <div class="main-container px-6">
        <h1 class="headline">Dijital Dünya<br>Sensin</h1>
        <p class="subline">Nasıl Bir İz Bırakacaksın?</p>
        
        <div class="mt-20 flex flex-col items-center">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="animate-pulse">
                <path d="M12 2v8M12 14v8M2 12h8M14 12h8"/>
                <circle cx="12" cy="12" r="3" fill="#16a34a" fill-opacity="0.4"/>
            </svg>
            <div class="mt-4 px-3 py-1 border border-green-500/30 rounded-full shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                <span class="text-[10px] uppercase tracking-[0.3em] text-green-700 font-mono">Trace.Identity: Global</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        let width, height, columns;
        const fontSize = 16;
        const chars = "0101010101"; 
        let drops = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#16a34a'; 
            ctx.font = fontSize + 'px monospace';
            // Matrix karakterlerine de hafif neon parlama verelim
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#22c55e';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            ctx.shadowBlur = 0; // Diğer çizimler için sıfırla
        }

        window.addEventListener('resize', init);
        init();
        setInterval(draw, 35);
    </script>
</body>
</html>
